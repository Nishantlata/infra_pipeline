trigger:
- main

pool:
  name: "may agent pool -infra"

stages: 
- stage: Lint
  displayName: Lintprocess
  jobs:
      - job: terraformlint
        steps:
          - task: Bash@3
            inputs:
              targetType: 'inline'
              script: |
                # Write your commands here
                 sudo apt-get update
                 sudo apt-get install -y unzip
                 curl -s https://raw.githubusercontent.com/terraform-linters/tflint/master/install_linux.sh | bash
                 export PATH=$PATH:$PWD
                 ./tflint --init
                 ./tflint


- stage: Firststage
  displayName: terraform init
  jobs:
  - job: terraform_initialization
    steps:
    - task: TerraformTaskV4@4
      displayName: Terraform Init
      inputs:
        provider: 'azurerm'
        command: 'init'
        backendServiceArm: 'may-infra'
        backendAzureRmResourceGroupName: 'devops'
        backendAzureRmStorageAccountName: 'infrastg1'
        backendAzureRmContainerName: 'infracont'
        backendAzureRmKey: 'main.tfstate'


- stage: Secondstage
  displayName: terraform validate
  jobs:
  - job: terraform_validation
    steps:
    - task: TerraformTaskV4@4
      displayName: Terraform Init
      inputs:
        provider: 'azurerm'
        command: 'init'
        backendServiceArm: 'may-infra'
        backendAzureRmResourceGroupName: 'devops'
        backendAzureRmStorageAccountName: 'infrastg1'
        backendAzureRmContainerName: 'infracont'
        backendAzureRmKey: 'main.tfstate'
    - task: TerraformTask@5
      inputs:
        provider: 'azurerm'
        command: 'validate'

- stage: Thirdstage
  displayName: terraform plan
  jobs:
  - job: terraform_plan
    steps:
    - task: TerraformTaskV4@4
      displayName: Terraform Init
      inputs:
        provider: 'azurerm'
        command: 'init'
        backendServiceArm: 'may-infra'
        backendAzureRmResourceGroupName: 'devops'
        backendAzureRmStorageAccountName: 'infrastg1'
        backendAzureRmContainerName: 'infracont'
        backendAzureRmKey: 'main.tfstate'

    - task: TerraformTask@5
      inputs:
        provider: 'azurerm'
        command: 'plan'
        environmentServiceNameAzureRM: 'may-infra'

- stage: Thorthstage
  displayName: terraform Apply
  jobs:
  - job: terraform_Apply
    steps:
    - task: TerraformTaskV4@4
      displayName: Terraform Apply
      inputs:
        provider: 'azurerm'
        command: 'init'
        backendServiceArm: 'may-infra'
        backendAzureRmResourceGroupName: 'devops'
        backendAzureRmStorageAccountName: 'infrastg1'
        backendAzureRmContainerName: 'infracont'
        backendAzureRmKey: 'main.tfstate'
    
    - task: TerraformTask@5
      inputs:
        provider: 'azurerm'
        command: 'apply'
        environmentServiceNameAzureRM: 'may-infra'
