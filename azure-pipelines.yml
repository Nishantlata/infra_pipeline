trigger:
- main

pool:
  name: "may agent pool -infra"

stages: 
- stage: Lint
  displayName: Lintprocess
  jobs:
  - job: terraformlint
    steps:
    - task: Bash@3
      inputs:
        targetType: 'inline'
        script: |
          echo "Downloading TFLint..."

          curl -L -o tflint.zip https://github.com/terraform-linters/tflint/releases/latest/download/tflint_windows_amd64.zip
          
          echo "Unzipping..."
          powershell.exe -Command "Expand-Archive -Path tflint.zip -DestinationPath ."

          echo "Running TFLint..."
          ./tflint.exe --init
          ./tflint.exe


- stage: Firststage
  displayName: terraform init
  jobs:
  - job: terraform_initialization
    steps:
    - task: TerraformTaskV4@4
      displayName: Terraform Init
      inputs:
        provider: 'azurerm'
        command: 'init'
        backendServiceArm: 'may-infra'
        backendAzureRmResourceGroupName: 'devops'
        backendAzureRmStorageAccountName: 'infrastg1'
        backendAzureRmContainerName: 'infracont'
        backendAzureRmKey: 'main.tfstate'


- stage: Secondstage
  displayName: terraform validate
  jobs:
  - job: terraform_validation
    steps:
    - task: TerraformTaskV4@4
      displayName: Terraform Init
      inputs:
        provider: 'azurerm'
        command: 'init'
        backendServiceArm: 'may-infra'
        backendAzureRmResourceGroupName: 'devops'
        backendAzureRmStorageAccountName: 'infrastg1'
        backendAzureRmContainerName: 'infracont'
        backendAzureRmKey: 'main.tfstate'
    - task: TerraformTask@5
      inputs:
        provider: 'azurerm'
        command: 'validate'

- stage: Thirdstage
  displayName: terraform plan
  jobs:
  - job: terraform_plan
    steps:
    - task: TerraformTaskV4@4
      displayName: Terraform Init
      inputs:
        provider: 'azurerm'
        command: 'init'
        backendServiceArm: 'may-infra'
        backendAzureRmResourceGroupName: 'devops'
        backendAzureRmStorageAccountName: 'infrastg1'
        backendAzureRmContainerName: 'infracont'
        backendAzureRmKey: 'main.tfstate'

    - task: TerraformTask@5
      inputs:
        provider: 'azurerm'
        command: 'plan'
        environmentServiceNameAzureRM: 'may-infra'

- stage: Thorthstage
  displayName: terraform Apply
  jobs:
  - job: terraform_Apply
    steps:
    - task: TerraformTaskV4@4
      displayName: Terraform Apply
      inputs:
        provider: 'azurerm'
        command: 'init'
        backendServiceArm: 'may-infra'
        backendAzureRmResourceGroupName: 'devops'
        backendAzureRmStorageAccountName: 'infrastg1'
        backendAzureRmContainerName: 'infracont'
        backendAzureRmKey: 'main.tfstate'
    
    - task: TerraformTask@5
      inputs:
        provider: 'azurerm'
        command: 'apply'
        environmentServiceNameAzureRM: 'may-infra'
